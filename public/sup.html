
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perforación — Supervisor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

:root {
  --bg: #F5F6F8;
  --surface: #FFFFFF;
  --border: #DDE1E7;
  --accent: #1B4FD8;
  --accent-dim: rgba(27, 79, 216, 0.08);
  --text: #0F1923;
  --muted: #6B7A8D;
  --danger: #C0392B;
  --warn: #D97706;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,212,160,0.1);
    border: 1px solid rgba(0,212,160,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .last-update { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .main { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  @media (max-width: 800px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--kpi-color, var(--accent));
  }

  .kpi-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; }
  .kpi-val { font-family: var(--mono); font-size: 30px; font-weight: 500; color: var(--kpi-color, var(--accent)); line-height: 1; }
  .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* CHARTS ROW */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }

  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .chart-wrap { position: relative; height: 200px; }

  /* TABLA */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr { border-bottom: 1px solid var(--border); }

  th {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 8px 12px;
    text-align: left;
    font-weight: 400;
  }

  td { padding: 10px 12px; border-bottom: 1px solid rgba(42,45,58,0.5); }

  tr.new-row td { animation: rowIn 0.4s ease; }

  @keyframes rowIn {
    from { background: rgba(0,212,160,0.08); }
    to { background: transparent; }
  }

  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
    text-transform: uppercase;
  }

  .tag-dia { background: rgba(240,165,0,0.15); color: var(--warn); }
  .tag-noche { background: rgba(124,111,255,0.15); color: var(--accent2); }

  .barreno-id { font-family: var(--mono); color: var(--accent); font-size: 13px; }
  .prof-val { font-family: var(--mono); color: var(--warn); }

  /* FILTROS */
  .filtros { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .filtro-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .filtro-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,160,0.08);
  }

  .filtro-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 12px;
    outline: none;
    width: 160px;
  }

  .filtro-input:focus { border-color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Supervisor · Perforación</div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>En vivo</div>
    <div class="last-update" id="lastUpdate">—</div>
  </div>
</header>

<div class="main">

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi" style="--kpi-color: var(--accent)">
      <div class="kpi-label">Metros totales</div>
      <div class="kpi-val" id="kpiMetros">0</div>
      <div class="kpi-sub">del turno activo</div>
    </div>
    <div class="kpi" style="--kpi-color: var(--warn)">
      <div class="kpi-label">Barrenos</div>
      <div class="kpi-val" id="kpiBarrenos">0</div>
      <div class="kpi-sub">perforados hoy</div>
    </div>
    <div class="kpi" style="--kpi-color: var(--accent2)">
      <div class="kpi-label">Prof. promedio</div>
      <div class="kpi-val" id="kpiProm">—</div>
      <div class="kpi-sub">metros / barreno</div>
    </div>
    <div class="kpi" style="--kpi-color: #ff7eb3">
      <div class="kpi-label">Operadores</div>
      <div class="kpi-val" id="kpiOps">0</div>
      <div class="kpi-sub">activos hoy</div>
    </div>
  </div>

  <!-- GRÁFICAS -->
  <div class="charts-row">
    <div class="card">
      <div class="card-title">Metros por operador</div>
      <div class="chart-wrap">
        <canvas id="chartOps"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Acumulado en el tiempo</div>
      <div class="chart-wrap">
        <canvas id="chartTime"></canvas>
      </div>
    </div>
  </div>

  <!-- TABLA -->
  <div class="card">
    <div class="card-title" style="margin-bottom:12px">Últimos registros</div>
    <div class="filtros" style="margin-bottom:16px">
      <button class="filtro-btn active" onclick="setFiltro('TODOS', this)">Todos</button>
      <button class="filtro-btn" onclick="setFiltro('DIA', this)">Día</button>
      <button class="filtro-btn" onclick="setFiltro('NOCHE', this)">Noche</button>
      <input class="filtro-input" id="filtroOp" placeholder="Buscar operador..." oninput="renderTabla()">
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Barreno</th>
            <th>Operador</th>
            <th>Equipo</th>
            <th>Voladura</th>
            <th>Prof.</th>
            <th>Turno</th>
            <th>Hora</th>
          </tr>
        </thead>
        <tbody id="tablaBody">
          <tr><td colspan="7" class="empty-state">Esperando datos en vivo...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- FIREBASE SDK -->
<script type="module">
  import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';


// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "...",
  authDomain: "drilling-app-d57d8.firebaseapp.com",
  projectId: "drilling-app-d57d8",
  storageBucket: "drilling-app-d57d8.firebasestorage.app",
  messagingSenderId: "...",
  appId: "...",
  databaseURL: "https://drilling-app-d57d8-default-rtdb.firebaseio.com"
};

  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'registros');

    onValue(dbRef, (snapshot) => {
      const data = snapshot.val();
      const registros = data ? Object.values(data) : [];
      window._updateDashboard(registros);
    });
  } catch(e) {
    console.warn('Firebase no configurado — cargando datos demo');
    // Datos demo para previsualización
    setTimeout(() => {
      window._updateDashboard([
        { operador:'Rodríguez', equipo:'EQ-01', voladura:'V-12', barreno:1, profundidad:15.2, techo:0, piso:15.2, turno:'DIA', fecha: new Date().toLocaleDateString('es-CO'), hora:'08:14' },
        { operador:'Martínez',  equipo:'EQ-02', voladura:'V-12', barreno:2, profundidad:14.8, techo:0, piso:14.8, turno:'DIA', fecha: new Date().toLocaleDateString('es-CO'), hora:'08:45' },
        { operador:'Rodríguez', equipo:'EQ-01', voladura:'V-12', barreno:3, profundidad:16.1, techo:0, piso:16.1, turno:'DIA', fecha: new Date().toLocaleDateString('es-CO'), hora:'09:20' },
        { operador:'Gómez',     equipo:'EQ-03', voladura:'V-12', barreno:4, profundidad:13.5, techo:0, piso:13.5, turno:'NOCHE', fecha: new Date().toLocaleDateString('es-CO'), hora:'22:10' },
        { operador:'Martínez',  equipo:'EQ-02', voladura:'V-12', barreno:5, profundidad:15.0, techo:0, piso:15.0, turno:'DIA', fecha: new Date().toLocaleDateString('es-CO'), hora:'10:05' },
      ]);
    }, 800);
  }
</script>

<script>
  let todosRegistros = [];
  let filtroTurno = 'TODOS';
  let chartOps = null;
  let chartTime = null;

  function setFiltro(val, el) {
    filtroTurno = val;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderTabla();
  }

  function registrosFiltrados() {
    const busq = (document.getElementById('filtroOp')?.value || '').toLowerCase();
    return todosRegistros.filter(r => {
      const turnoOk = filtroTurno === 'TODOS' || r.turno === filtroTurno;
      const opOk    = !busq || r.operador.toLowerCase().includes(busq);
      return turnoOk && opOk;
    });
  }

  function renderTabla() {
    const tbody = document.getElementById('tablaBody');
    const lista = [...registrosFiltrados()].reverse().slice(0, 50);
    if (!lista.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Sin registros para este filtro</td></tr>';
      return;
    }
    tbody.innerHTML = lista.map((r, i) => `
      <tr class="${i === 0 ? 'new-row' : ''}">
        <td class="barreno-id">B-${String(r.barreno).padStart(2,'0')}</td>
        <td>${r.operador}</td>
        <td style="color:var(--muted);font-family:var(--mono);font-size:12px">${r.equipo}</td>
        <td style="color:var(--muted);font-family:var(--mono);font-size:12px">${r.voladura}</td>
        <td class="prof-val">${Number(r.profundidad).toFixed(1)} m</td>
        <td><span class="tag ${r.turno === 'DIA' ? 'tag-dia' : 'tag-noche'}">${r.turno}</span></td>
        <td style="color:var(--muted);font-family:var(--mono);font-size:12px">${r.hora || '—'}</td>
      </tr>
    `).join('');
  }

  function updateKPIs(registros) {
    const total = registros.reduce((s, r) => s + Number(r.profundidad), 0);
    const prom  = registros.length ? total / registros.length : 0;
    const ops   = new Set(registros.map(r => r.operador)).size;

    document.getElementById('kpiMetros').textContent   = total.toFixed(1);
    document.getElementById('kpiBarrenos').textContent = registros.length;
    document.getElementById('kpiProm').textContent     = prom ? prom.toFixed(1) : '—';
    document.getElementById('kpiOps').textContent      = ops;
  }

  function updateChartOps(registros) {
    const por_op = {};
    registros.forEach(r => {
      por_op[r.operador] = (por_op[r.operador] || 0) + Number(r.profundidad);
    });
    const labels = Object.keys(por_op);
    const values = labels.map(k => parseFloat(por_op[k].toFixed(1)));

    const colors = ['#00d4a0','#7c6fff','#f0a500','#ff7eb3','#4db8ff'];

    if (chartOps) {
      chartOps.data.labels = labels;
      chartOps.data.datasets[0].data = values;
      chartOps.data.datasets[0].backgroundColor = labels.map((_,i) => colors[i % colors.length] + '33');
      chartOps.data.datasets[0].borderColor = labels.map((_,i) => colors[i % colors.length]);
      chartOps.update();
    } else {
      const ctx = document.getElementById('chartOps').getContext('2d');
      chartOps = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: labels.map((_,i) => colors[i % colors.length] + '33'),
            borderColor: labels.map((_,i) => colors[i % colors.length]),
            borderWidth: 1.5,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#6b7080', font: { family: "'IBM Plex Mono'", size: 11 } }, grid: { color: '#2a2d3a' } },
            y: { ticks: { color: '#6b7080', font: { family: "'IBM Plex Mono'", size: 11 } }, grid: { color: '#2a2d3a' } }
          }
        }
      });
    }
  }

  function updateChartTime(registros) {
    const sorted = [...registros].sort((a, b) => a.hora > b.hora ? 1 : -1);
    let acum = 0;
    const labels = sorted.map(r => r.hora || '');
    const data   = sorted.map(r => { acum += Number(r.profundidad); return parseFloat(acum.toFixed(1)); });

    if (chartTime) {
      chartTime.data.labels = labels;
      chartTime.data.datasets[0].data = data;
      chartTime.update();
    } else {
      const ctx = document.getElementById('chartTime').getContext('2d');
      chartTime = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data,
            borderColor: '#00d4a0',
            backgroundColor: 'rgba(0,212,160,0.06)',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: '#00d4a0',
            fill: true,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#6b7080', font: { family: "'IBM Plex Mono'", size: 10 }, maxTicksLimit: 8 }, grid: { color: '#2a2d3a' } },
            y: { ticks: { color: '#6b7080', font: { family: "'IBM Plex Mono'", size: 11 } }, grid: { color: '#2a2d3a' } }
          }
        }
      });
    }
  }

  window._updateDashboard = function(registros) {
    todosRegistros = registros;
    updateKPIs(registros);
    updateChartOps(registros);
    updateChartTime(registros);
    renderTabla();
    document.getElementById('lastUpdate').textContent =
      'Actualizado ' + new Date().toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  };
</script>
</body>
</html>
