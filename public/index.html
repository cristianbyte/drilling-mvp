
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perforación — Operador</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

:root {
  --bg: #F5F6F8;
  --surface: #FFFFFF;
  --border: #DDE1E7;
  --accent: #1B4FD8;
  --accent-dim: rgba(27, 79, 216, 0.08);
  --text: #0F1923;
  --muted: #6B7A8D;
  --danger: #C0392B;
  --warn: #D97706;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--accent);
  }

  select option { background: var(--surface); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .barreno-counter {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .barreno-num {
    font-family: var(--mono);
    font-size: 28px;
    color: var(--accent);
    font-weight: 500;
  }

  .barreno-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .total-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    text-align: right;
  }

  .total-val {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--warn);
  }

  .total-lbl {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0f1117;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-primary:active { transform: scale(0.98); opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-secondary {
    width: 100%;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 10px;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  .log-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-barreno {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
  }

  .log-prof {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--warn);
  }

  .log-meta {
    font-size: 11px;
    color: var(--muted);
  }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #0f1117;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    padding: 12px 24px;
    border-radius: 24px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .error-msg {
    color: var(--danger);
    font-size: 11px;
    font-family: var(--mono);
    margin-top: 4px;
    display: none;
  }

  .turno-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .turno-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .turno-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }
</style>
</head>
<body>

<header>
  <div class="logo">FOR-PO-04 · Perforación</div>
  <div class="status-dot" id="connDot" title="Conectado"></div>
</header>

<!-- DATOS DEL TURNO -->
<div class="section" id="sectionTurno">
  <div class="section-title">Datos del turno</div>

  <div class="field">
    <label>Nombre operador</label>
    <input type="text" id="operador" placeholder="Ej. Juan Rodríguez" autocomplete="name">
  </div>

  <div class="row2">
    <div class="field">
      <label>Equipo</label>
      <input type="text" id="equipo" placeholder="Ej. EQ-03">
    </div>
    <div class="field">
      <label># Voladura</label>
      <input type="text" id="voladura" placeholder="Ej. V-12">
    </div>
  </div>

  <div class="row3">
    <div class="field">
      <label>Diámetro (mm)</label>
      <input type="number" id="diametro" placeholder="89" inputmode="decimal">
    </div>
    <div class="field">
      <label>Cota (m)</label>
      <input type="number" id="cota" placeholder="1250" inputmode="decimal">
    </div>
    <div class="field">
      <label>Patrón</label>
      <input type="text" id="patron" placeholder="3×3">
    </div>
  </div>

  <div class="field">
    <label>Turno</label>
    <div class="turno-btns">
      <div class="turno-btn active" onclick="setTurno('DIA', this)">Día</div>
      <div class="turno-btn" onclick="setTurno('NOCHE', this)">Noche</div>
    </div>
  </div>
</div>

<!-- REGISTRO DE BARRENO -->
<div class="section">
  <div class="section-title">Registro de barreno</div>

  <div class="barreno-counter">
    <div>
      <div class="barreno-label">Barreno #</div>
      <div class="barreno-num" id="barrenoNum">1</div>
    </div>
    <div class="total-badge">
      <div class="total-val" id="totalMts">0.0 m</div>
      <div class="total-lbl">Total turno</div>
    </div>
  </div>

  <div class="row3">
    <div class="field">
      <label>Prof. (m)</label>
      <input type="number" id="profundidad" placeholder="0.0" inputmode="decimal" step="0.1">
      <div class="error-msg" id="errProf">Requerido</div>
    </div>
    <div class="field">
      <label>Techo (m)</label>
      <input type="number" id="techo" placeholder="0.0" inputmode="decimal" step="0.1">
    </div>
    <div class="field">
      <label>Piso (m)</label>
      <input type="number" id="piso" placeholder="0.0" inputmode="decimal" step="0.1">
    </div>
  </div>

  <button class="btn-primary" id="btnGuardar" onclick="guardarBarreno()">Guardar barreno</button>
  <button class="btn-secondary" onclick="nuevaTanda()">Nuevo turno / reset</button>
</div>

<!-- LOG LOCAL -->
<div class="section">
  <div class="section-title">Registros este turno</div>
  <ul class="log-list" id="logList">
    <li style="color:var(--muted); font-size:13px; font-family:var(--mono); text-align:center; padding:20px 0;">
      Aún no hay registros
    </li>
  </ul>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, push, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "...",
  authDomain: "drilling-app-d57d8.firebaseapp.com",
  projectId: "drilling-app-d57d8",
  storageBucket: "drilling-app-d57d8.firebasestorage.app",
  messagingSenderId: "...",
  appId: "...",
  databaseURL: "https://drilling-app-d57d8-default-rtdb.firebaseio.com"
};

// Initialize Firebase
  // =====================================================

  let app, db, dbReady = false;

  try {
    app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    dbReady = true;
    document.getElementById('connDot').style.background = '#00d4a0';
  } catch(e) {
    document.getElementById('connDot').style.background = '#ff5c5c';
    console.warn('Firebase no configurado — modo offline');
  }

  window._firebasePush = async (data) => {
    if (!dbReady) return null;
    const r = ref(db, 'registros');
    return push(r, { ...data, timestamp: serverTimestamp() });
  };
</script>

<script>
  let turno = 'DIA';
  let barrenos = [];
  let totalMetros = 0;

  function setTurno(val, el) {
    turno = val;
    document.querySelectorAll('.turno-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  async function guardarBarreno() {
    const prof = parseFloat(document.getElementById('profundidad').value);
    if (!prof || prof <= 0) {
      document.getElementById('errProf').style.display = 'block';
      document.getElementById('profundidad').focus();
      return;
    }
    document.getElementById('errProf').style.display = 'none';

    const operador = document.getElementById('operador').value.trim() || 'Sin nombre';
    const equipo   = document.getElementById('equipo').value.trim() || '—';
    const voladura = document.getElementById('voladura').value.trim() || '—';
    const diametro = document.getElementById('diametro').value || '—';
    const cota     = document.getElementById('cota').value || '—';
    const patron   = document.getElementById('patron').value.trim() || '—';
    const techo    = parseFloat(document.getElementById('techo').value) || 0;
    const piso     = parseFloat(document.getElementById('piso').value) || 0;
    const num      = barrenos.length + 1;

    const registro = {
      operador, equipo, voladura, diametro, cota, patron,
      turno, barreno: num,
      profundidad: prof, techo, piso,
      fecha: new Date().toLocaleDateString('es-CO'),
      hora: new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' })
    };

    const btn = document.getElementById('btnGuardar');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      if (window._firebasePush) await window._firebasePush(registro);
    } catch(e) { console.warn('Firebase error:', e); }

    barrenos.push(registro);
    totalMetros = barrenos.reduce((s, b) => s + b.profundidad, 0);

    document.getElementById('barrenoNum').textContent = barrenos.length + 1;
    document.getElementById('totalMts').textContent = totalMetros.toFixed(1) + ' m';

    ['profundidad','techo','piso'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('profundidad').focus();

    renderLog();
    showToast('Barreno #' + num + ' guardado ✓');

    btn.disabled = false;
    btn.textContent = 'Guardar barreno';
  }

  function renderLog() {
    const ul = document.getElementById('logList');
    if (!barrenos.length) {
      ul.innerHTML = '<li style="color:var(--muted);font-size:13px;font-family:var(--mono);text-align:center;padding:20px 0;">Aún no hay registros</li>';
      return;
    }
    ul.innerHTML = [...barrenos].reverse().map(b => `
      <li class="log-item">
        <div>
          <div class="log-barreno">B-${String(b.barreno).padStart(2,'0')}</div>
          <div class="log-meta">${b.hora} · ${b.turno}</div>
        </div>
        <div class="log-prof">${b.profundidad.toFixed(1)} m</div>
      </li>
    `).join('');
  }

  function nuevaTanda() {
    if (barrenos.length && !confirm('¿Resetear el turno? Los datos ya están guardados en Firebase.')) return;
    barrenos = [];
    totalMetros = 0;
    document.getElementById('barrenoNum').textContent = '1';
    document.getElementById('totalMts').textContent = '0.0 m';
    ['profundidad','techo','piso'].forEach(id => document.getElementById(id).value = '');
    renderLog();
    showToast('Turno reiniciado');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.tagName === 'INPUT') guardarBarreno();
  });
</script>
</body>
</html>
